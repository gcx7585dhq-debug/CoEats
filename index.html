<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoEats Pro - 強化版</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .ocr-loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: .5; } }
    </style>
</head>

<body class="bg-slate-50">
<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl">

    <!-- Header -->
    <header class="bg-emerald-600 text-white p-6 text-center">
        <h1 class="text-2xl font-black">🍱 CoEats 訂餐助手</h1>
        <p class="text-sm opacity-80">強化穩定版</p>
    </header>

    <!-- Tabs -->
    <div class="flex p-4 gap-2">
        <button @click="view='user'" :class="tabClass('user')">點餐</button>
        <button @click="view='admin'" :class="tabClass('admin')">管理</button>
    </div>

    <main class="p-4 space-y-4">

        <!-- ADMIN -->
        <div v-if="view==='admin'">

            <!-- OCR -->
            <div class="bg-emerald-50 p-4 rounded-xl">
                <label class="block text-center cursor-pointer">
                    <div v-if="!isProcessing">📸 拍菜單匯入</div>
                    <div v-else class="ocr-loading">辨識中...</div>
                    <input type="file" hidden @change="handleOcr">
                </label>

                <div class="flex gap-2 mt-3">
                    <input v-model="newStoreName" placeholder="店名" class="flex-1 border p-2 rounded">
                    <button @click="addStore" class="bg-emerald-600 text-white px-4 rounded">新增</button>
                </div>
            </div>

            <!-- Stores -->
            <div v-for="(s,i) in stores" class="border p-3 rounded-xl">
                <div class="flex justify-between">
                    <b>{{s.name}}</b>
                    <button @click="removeStore(i)" class="text-red-400">刪</button>
                </div>

                <div v-for="(m,j) in s.items" class="flex justify-between text-sm mt-1">
                    <span>{{m.name}} ${{m.price}}</span>
                    <button @click="removeItem(i,j)">✕</button>
                </div>

                <div class="flex gap-1 mt-2">
                    <input v-model="s.tempItem" placeholder="菜名" class="flex-1 border-b">
                    <input v-model.number="s.tempPrice" type="number" class="w-16 border-b">
                    <button @click="addItem(i)">＋</button>
                </div>
            </div>

        </div>

        <!-- USER -->
        <div v-if="view==='user'">

            <div v-if="stores.length===0" class="text-center text-gray-400">
                尚無菜單
            </div>

            <div v-for="s in stores" class="bg-emerald-50 p-4 rounded-xl">
                <h2 class="font-bold mb-2">{{s.name}}</h2>

                <button v-for="m in s.items"
                    @click="orderItem(s.name,m)"
                    class="w-full flex justify-between bg-white p-2 mb-1 rounded">

                    <span>{{m.name}}</span>
                    <span>${{m.price}}</span>
                </button>
            </div>

        </div>

    </main>
</div>

<script>
const { createApp, ref, watch, onMounted } = Vue;

createApp({
setup(){

    const view = ref('user');
    const stores = ref(JSON.parse(localStorage.getItem('stores')||'[]'));
    const history = ref(JSON.parse(localStorage.getItem('history')||'[]'));

    const newStoreName = ref('');
    const isProcessing = ref(false);
    const liffReady = ref(false);

    // --- OCR ---
    const handleOcr = async (e) => {
        const file = e.target.files[0];
        if(!file) return;

        isProcessing.value = true;

        try{
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.filter = 'grayscale(100%) contrast(200%)';
            ctx.drawImage(img,0,0);

            const { data:{ text } } = await Tesseract.recognize(canvas,'chi_tra+eng');

            const lines = text.split('\n')
                .map(l=>l.trim())
                .filter(l=>l.length>2);

            const storeName = lines[0].replace(/[^\u4e00-\u9fa5]/g,'');

            if(!storeName) throw new Error();

            if(stores.value.some(s=>s.name===storeName)){
                alert('店家已存在');
                return;
            }

            const items = lines.slice(1)
                .map(l=>{
                    const m = l.match(/(.+?)[\s$]*(\d{2,3})/);
                    if(!m) return null;
                    return {name:m[1],price:+m[2]};
                })
                .filter(Boolean)
                .slice(0,10);

            if(items.length===0) throw new Error();

            if(confirm(`匯入 ${storeName} ?`)){
                stores.value.push({name:storeName,items,tempItem:'',tempPrice:0});
            }

        }catch{
            alert('辨識失敗');
        }

        isProcessing.value = false;
    };

    // --- Order ---
    const orderItem = (store,item)=>{
        const msg = `🍱訂單\n${store}\n${item.name} $${item.price}`;

        if(liffReady.value && liff.isInClient()){
            liff.sendMessages([{type:'text',text:msg}]);
        }else{
            navigator.clipboard.writeText(msg);
            alert('已複製訂單');
        }

        history.value.unshift({
            time:new Date().toLocaleString(),
            store,
            item:item.name
        });
    };

    // --- CRUD ---
    const addStore = ()=>{
        if(!newStoreName.value) return;
        if(stores.value.some(s=>s.name===newStoreName.value)){
            alert('已存在');
            return;
        }
        stores.value.push({name:newStoreName.value,items:[],tempItem:'',tempPrice:0});
        newStoreName.value='';
    };

    const removeStore = i=>stores.value.splice(i,1);

    const addItem = i=>{
        const s = stores.value[i];
        if(!s.tempItem) return;
        s.items.push({name:s.tempItem,price:s.tempPrice||0});
        s.tempItem=''; s.tempPrice=0;
    };

    const removeItem = (i,j)=>stores.value[i].items.splice(j,1);

    // --- storage ---
    watch(stores,v=>{
        try{
            localStorage.setItem('stores',JSON.stringify(v));
        }catch{}
    },{deep:true});

    watch(history,v=>{
        try{
            localStorage.setItem('history',JSON.stringify(v));
        }catch{}
    },{deep:true});

    // --- LIFF ---
    onMounted(async()=>{
        try{
            await liff.init({ liffId:"你的_LIFF_ID" });
            liffReady.value = true;
        }catch{}
    });

    const tabClass = (t)=>
        `flex-1 py-2 rounded ${view.value===t?'bg-emerald-500 text-white':'bg-gray-100'}`;

    return {
        view,stores,newStoreName,isProcessing,
        handleOcr,addStore,removeStore,addItem,removeItem,orderItem,tabClass
    };
}
}).mount('#app');
</script>

</body>
</html>

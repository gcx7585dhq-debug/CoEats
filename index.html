<index.html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司點餐系統 (LIFF)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100">
    <div id="app" class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold text-center mb-6 text-green-600">公司訂餐助手</h1>

        <div class="flex mb-4 bg-white rounded-lg shadow">
            <button @click="view = 'user'" :class="view === 'user' ? 'bg-green-500 text-white' : ''" class="flex-1 py-2 rounded-l-lg">我要點餐</button>
            <button @click="view = 'admin'" :class="view === 'admin' ? 'bg-green-500 text-white' : ''" class="flex-1 py-2 rounded-r-lg">行政管理</button>
        </div>

        <div v-if="view === 'user'">
            <div v-for="(store, sIdx) in stores" :key="sIdx" class="bg-white p-4 mb-4 rounded-xl shadow">
                <h2 class="text-xl font-bold border-b pb-2 mb-2">{{ store.name }}</h2>
                <ul>
                    <li v-for="(menu, mIdx) in store.menu" :key="mIdx" class="flex justify-between py-2">
                        <span>{{ menu.name }}</span>
                        <div class="flex items-center">
                            <span class="mr-4 text-orange-500">${{ menu.price }}</span>
                            <button @click="orderItem(store.name, menu)" class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">點餐</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>

        <div v-if="view === 'admin'" class="space-y-6">
            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold mb-2">新增店家</h3>
                <div class="flex gap-2">
                    <input v-model="newStoreName" type="text" placeholder="店家名稱" class="flex-1 border p-2 rounded">
                    <button @click="addStore" class="bg-blue-500 text-white px-4 py-2 rounded">新增</button>
                </div>
            </div>

            <div v-for="(store, sIdx) in stores" :key="sIdx" class="bg-white p-4 rounded-xl shadow relative">
                <button @click="removeStore(sIdx)" class="absolute top-2 right-2 text-red-400">刪除店家</button>
                <h3 class="font-bold text-lg text-blue-600">{{ store.name }}</h3>
                
                <div class="mt-2 space-y-2">
                    <div v-for="(menu, mIdx) in store.menu" :key="mIdx" class="flex justify-between text-sm bg-gray-50 p-2">
                        <span>{{ menu.name }} (${{ menu.price }})</span>
                        <button @click="removeMenu(sIdx, mIdx)" class="text-red-500">刪除</button>
                    </div>
                </div>

                <div class="mt-3 flex gap-2">
                    <input v-model="newMenuName" placeholder="菜名" class="border text-sm p-1 w-1/2">
                    <input v-model="newMenuPrice" type="number" placeholder="價格" class="border text-sm p-1 w-1/4">
                    <button @click="addMenu(sIdx)" class="bg-gray-200 px-2 rounded text-sm">加菜</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold mb-4 border-b">未繳費員工 (個別通知)</h3>
                <div v-for="user in unpaidUsers" :key="user.id" class="flex justify-between items-center py-2 border-b last:border-0">
                    <div>
                        <p class="font-medium">{{ user.name }}</p>
                        <p class="text-xs text-gray-400">金額: ${{ user.amount }}</p>
                    </div>
                    <button @click="sendReminder(user)" class="bg-orange-500 text-white px-4 py-1 rounded-full text-sm">提醒他</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const view = ref('user');
                const stores = ref(JSON.parse(localStorage.getItem('order_stores')) || [
                    { name: '巷口便當', menu: [{ name: '排骨飯', price: 100 }] }
                ]);
                const unpaidUsers = ref([
                    { id: 'u1', name: '王小明', amount: 100 },
                    { id: 'u2', name: '李大華', amount: 120 }
                ]);

                const newStoreName = ref('');
                const newMenuName = ref('');
                const newMenuPrice = ref('');

                // 儲存資料
                const save = () => localStorage.setItem('order_stores', JSON.stringify(stores.value));

                const addStore = () => {
                    if (!newStoreName.value) return;
                    stores.value.push({ name: newStoreName.value, menu: [] });
                    newStoreName.value = '';
                    save();
                };

                const removeStore = (idx) => { stores.value.splice(idx, 1); save(); };

                const addMenu = (sIdx) => {
                    if (!newMenuName.value || !newMenuPrice.value) return;
                    stores.value[sIdx].menu.push({ name: newMenuName.value, price: newMenuPrice.value });
                    newMenuName.value = ''; newMenuPrice.value = '';
                    save();
                };

                const removeMenu = (sIdx, mIdx) => { stores.value[sIdx].menu.splice(mIdx, 1); save(); };

                // 重要：個別通知功能
                const sendReminder = (user) => {
                    // 呼叫 LINE LIFF 發送訊息功能
                    if (liff.isInClient()) {
                        liff.sendMessages([{
                            type: 'text',
                            text: `📢 繳費提醒：\n${user.name} 您好，您尚有午餐費 $${user.amount} 未繳交，請記得找行政人員喔！`
                        }]).then(() => {
                            alert('已成功發送個別提醒到聊天室！');
                        }).catch(err => alert('發送失敗，請確認權限'));
                    } else {
                        alert('非 LINE 環境，無法發送訊息：\n' + user.name + ' 該繳錢囉！');
                    }
                };

                onMounted(() => {
                    // 初始化 LIFF
                    liff.init({ liffId: "YOUR_LIFF_ID" }).then(() => {
                        if (!liff.isLoggedIn()) liff.login();
                    });
                });

                return { view, stores, unpaidUsers, newStoreName, newMenuName, newMenuPrice, addStore, removeStore, addMenu, removeMenu, sendReminder };
            }
        }).mount('#app');
    </script>
</body>
</html>

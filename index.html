<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoEats Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>

</head>

<body class="bg-slate-100">
<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow">

<header class="bg-emerald-600 text-white p-4 text-center">
  <h1 class="text-xl font-bold">🍱 CoEats 訂餐系統</h1>
</header>

<div class="flex p-2 gap-2">
  <button @click="view='user'" class="flex-1 py-2 rounded"
    :class="view==='user'?'bg-emerald-500 text-white':'bg-gray-200'">點餐</button>

  <button @click="view='admin'" class="flex-1 py-2 rounded"
    :class="view==='admin'?'bg-emerald-500 text-white':'bg-gray-200'">管理</button>
</div>

<!-- ADMIN -->
<div v-if="view==='admin'" class="p-4 space-y-4">

  <div class="bg-yellow-50 p-3 rounded">
    <h2 class="font-bold mb-2">📦 訂單任務</h2>

    <label for="taskName" class="text-sm">任務名稱</label>
    <input id="taskName" v-model="taskName"
      placeholder="例如：午餐"
      title="任務名稱"
      class="w-full mb-2 p-2 border rounded">

    <label for="cutoffTime" class="text-sm">結算時間</label>
    <input id="cutoffTime" type="time" v-model="cutoffTime"
      title="結算時間"
      class="w-full mb-2 p-2 border rounded">

    <button @click="createTask"
      class="w-full bg-emerald-500 text-white py-2 rounded">
      建立訂單
    </button>
  </div>

  <div>
    <h2 class="font-bold mb-2">🏪 店家</h2>

    <label for="storeName" class="text-sm">新增店家</label>
    <div class="flex gap-2 mb-2">
      <input id="storeName" v-model="newStore"
        placeholder="輸入店名"
        title="店家名稱"
        class="flex-1 p-2 border rounded">
      <button @click="addStore" class="bg-blue-500 text-white px-3 rounded">＋</button>
    </div>

    <div v-for="(s,i) in stores" class="border p-2 mb-2 rounded">
      <div class="font-bold">{{s.name}}</div>

      <div v-for="(item,j) in s.items" class="flex justify-between text-sm">
        {{item.name}} - ${{item.price}}
        <button @click="removeItem(i,j)" class="text-red-500">X</button>
      </div>

      <div class="flex gap-1 mt-1">
        <input v-model="s.tempName"
          placeholder="菜名"
          title="菜名"
          class="flex-1 border p-1">

        <input v-model.number="s.tempPrice" type="number"
          placeholder="價格"
          title="價格"
          class="w-16 border p-1">

        <button @click="addItem(i)" class="bg-green-500 text-white px-2">＋</button>
      </div>
    </div>
  </div>

</div>

<!-- USER -->
<div v-if="view==='user'" class="p-4 space-y-4">

  <div v-if="!activeTask" class="text-center text-gray-400">
    尚未開啟訂單
  </div>

  <div v-else>
    <div class="bg-emerald-100 p-2 rounded mb-2 text-sm">
      📦 {{activeTask.name}}<br>
      ⏰ 截止：{{activeTask.cutoff}}<br>
      ⏳ 剩餘：{{countdown}}
    </div>

    <div v-for="store in stores" class="bg-gray-50 p-3 rounded mb-3">
      <div class="font-bold mb-2">{{store.name}}</div>

      <button v-for="item in store.items"
        @click="order(store.name,item)"
        class="w-full flex justify-between bg-white p-2 mb-1 rounded shadow">
        <span>{{item.name}}</span>
        <span>${{item.price}}</span>
      </button>
    </div>
  </div>

</div>

</div>

<script>
const {createApp, ref, computed} = Vue;

createApp({
setup(){

const view = ref('user');

const stores = ref(JSON.parse(localStorage.getItem('stores')) || []);
const tasks = ref(JSON.parse(localStorage.getItem('tasks')) || []);

const newStore = ref('');
const taskName = ref('');
const cutoffTime = ref('');
const countdown = ref('');

const activeTask = computed(()=>tasks.value.find(t=>!t.closed));

// 店家
const addStore = ()=>{
  if(!newStore.value) return;
  stores.value.push({name:newStore.value,items:[],tempName:'',tempPrice:0});
  newStore.value='';
};

const addItem = (i)=>{
  const s = stores.value[i];
  if(!s.tempName) return;
  s.items.push({name:s.tempName,price:s.tempPrice});
  s.tempName=''; s.tempPrice=0;
};

const removeItem = (i,j)=>stores.value[i].items.splice(j,1);

// 任務
const createTask = ()=>{
  if(!taskName.value || !cutoffTime.value) return;

  tasks.value.forEach(t=>t.closed=true);

  tasks.value.push({
    name: taskName.value,
    cutoff: cutoffTime.value,
    orders: [],
    closed:false
  });

  taskName.value='';
};

// 點餐
const order = (store,item)=>{
  if(!activeTask.value) return alert("尚未開單");

  const now = new Date().toTimeString().slice(0,5);

  if(now > activeTask.value.cutoff){
    activeTask.value.closed = true;
    return alert("已截止");
  }

  activeTask.value.orders.push({
    store,
    item:item.name,
    price:item.price,
    time:new Date().toLocaleTimeString()
  });

  alert("已下單");
};

// 倒數
setInterval(()=>{
  if(!activeTask.value) return;

  const now = new Date();
  const today = now.toISOString().split('T')[0];
  const deadline = new Date(today + 'T' + activeTask.value.cutoff);

  const diff = deadline - now;

  if(diff <= 0){
    countdown.value = "已截止";
    activeTask.value.closed = true;
    return;
  }

  const m = Math.floor(diff/60000);
  const s = Math.floor((diff%60000)/1000);

  countdown.value = `${m}分 ${s}秒`;

},1000);

// 儲存
setInterval(()=>{
  localStorage.setItem('stores',JSON.stringify(stores.value));
  localStorage.setItem('tasks',JSON.stringify(tasks.value));
},1000);

return {
  view,stores,newStore,
  addStore,addItem,removeItem,
  taskName,cutoffTime,createTask,
  activeTask,order,countdown
};

}
}).mount("#app");
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoEats AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-gray-100">

<div id="app" class="max-w-md mx-auto p-4 bg-white min-h-screen">

<h1 class="text-xl font-bold mb-4">🍱 CoEats AI OCR</h1>

<label class="block mb-2 font-bold">上傳菜單</label>
<input type="file"
       @change="handleImage"
       accept="image/*"
       title="上傳菜單圖片"
       class="w-full border p-2 mb-3">

<div v-if="loading">辨識中...</div>

<div v-if="result.length">
  <div v-for="item in result" class="flex justify-between border p-2 mb-1">
    <span>{{item.name}}</span>
    <span>${{item.price}}</span>
  </div>
</div>

</div>

<script>
const { createApp, ref } = Vue;

createApp({
setup(){

const loading = ref(false);
const result = ref([]);

// 🔥 換成你的 Railway API
const API_URL = "https://coeats-production.up.railway.app/ocr";

const handleImage = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  loading.value = true;

  const base64 = await toBase64(file);

  const res = await fetch(API_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ image: base64 })
  });

  const data = await res.json();

  try{
    const text = data.output[0].content[0].text;
    result.value = JSON.parse(text);
  }catch{
    alert("AI解析失敗");
  }

  loading.value = false;
};

const toBase64 = (file)=>{
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(file);
  });
};

return { handleImage, loading, result };

}
}).mount("#app");
</script>

</body>
</html>

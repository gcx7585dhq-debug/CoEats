<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoEats Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body class="bg-slate-100">
<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow">

<header class="bg-emerald-600 text-white p-4 text-center">
  <h1 class="text-xl font-bold">🍱 CoEats 訂餐系統</h1>
</header>

<div class="flex p-2 gap-2">
  <button @click="view='user'" class="flex-1 py-2 rounded"
    :class="view==='user'?'bg-emerald-500 text-white':'bg-gray-200'">點餐</button>

  <button @click="view='admin'" class="flex-1 py-2 rounded"
    :class="view==='admin'?'bg-emerald-500 text-white':'bg-gray-200'">管理</button>
</div>

<!-- ADMIN -->
<div v-if="view==='admin'" class="p-4 space-y-4">

  <!-- 任務 -->
  <div class="bg-yellow-50 p-3 rounded">
    <h2 class="font-bold mb-2">📦 訂單任務</h2>

    <label>任務名稱</label>
    <input v-model="taskName" placeholder="例如：午餐" title="任務名稱"
      class="w-full mb-2 p-2 border rounded">

    <label>結算時間</label>
    <input type="time" v-model="cutoffTime" title="結算時間"
      class="w-full mb-2 p-2 border rounded">

    <button @click="createTask"
      class="w-full bg-emerald-500 text-white py-2 rounded">
      建立訂單
    </button>
  </div>

  <!-- OCR 上傳 -->
  <div class="bg-blue-50 p-3 rounded">
    <h2 class="font-bold mb-2">📷 菜單辨識</h2>

    <input type="file" accept="image/*" @change="handleImage" title="上傳菜單">
    <div v-if="ocrLoading" class="text-sm text-gray-500 mt-2">辨識中...</div>
  </div>

  <!-- 店家 -->
  <div>
    <h2 class="font-bold mb-2">🏪 店家</h2>

    <input v-model="newStore" placeholder="店名" title="店名"
      class="w-full mb-2 p-2 border rounded">

    <button @click="addStore" class="w-full bg-blue-500 text-white py-2 rounded mb-2">新增店家</button>

    <div v-for="(s,i) in stores" class="border p-2 mb-2 rounded">
      <div class="font-bold">{{s.name}}</div>

      <div v-for="(item,j) in s.items" class="flex justify-between text-sm">
        {{item.name}} - ${{item.price}}
        <button @click="removeItem(i,j)" class="text-red-500">X</button>
      </div>
    </div>
  </div>

</div>

<!-- USER -->
<div v-if="view==='user'" class="p-4 space-y-4">

  <div v-if="!activeTask" class="text-center text-gray-400">
    尚未開單
  </div>

  <div v-else>
    <div class="bg-emerald-100 p-2 rounded text-sm">
      📦 {{activeTask.name}}<br>
      ⏰ {{activeTask.cutoff}}<br>
      ⏳ {{countdown}}
    </div>

    <div v-for="store in stores" class="bg-gray-50 p-3 rounded mt-3">
      <div class="font-bold">{{store.name}}</div>

      <button v-for="item in store.items"
        @click="order(store.name,item)"
        class="w-full flex justify-between bg-white p-2 mt-1 rounded shadow">
        <span>{{item.name}}</span>
        <span>${{item.price}}</span>
      </button>
    </div>
  </div>

</div>

</div>

<script>
const {createApp, ref, computed} = Vue;

createApp({
setup(){

const view = ref('user');

const stores = ref(JSON.parse(localStorage.getItem('stores')) || []);
const tasks = ref(JSON.parse(localStorage.getItem('tasks')) || []);

const newStore = ref('');
const taskName = ref('');
const cutoffTime = ref('');
const countdown = ref('');
const ocrLoading = ref(false);

const activeTask = computed(()=>tasks.value.find(t=>!t.closed));

// ===== 店家 =====
const addStore = ()=>{
  if(!newStore.value) return;
  stores.value.push({name:newStore.value,items:[]});
  newStore.value='';
};

const removeItem = (i,j)=>stores.value[i].items.splice(j,1);

// ===== 任務 =====
const createTask = ()=>{
  if(!taskName.value || !cutoffTime.value) return;

  tasks.value.forEach(t=>t.closed=true);

  tasks.value.push({
    name:taskName.value,
    cutoff:cutoffTime.value,
    orders:[],
    closed:false
  });

  taskName.value='';
};

// ===== 點餐 =====
const order = (store,item)=>{
  if(!activeTask.value) return alert("尚未開單");

  const now = new Date().toTimeString().slice(0,5);

  if(now > activeTask.value.cutoff){
    activeTask.value.closed = true;
    return alert("已截止");
  }

  activeTask.value.orders.push({
    store,
    item:item.name,
    price:item.price
  });

  alert("已下單");
};

// ===== OCR =====
const handleImage = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;

  ocrLoading.value = true;

  const img = new Image();
  img.src = URL.createObjectURL(file);
  await img.decode();

  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.filter = 'grayscale(100%) contrast(300%) brightness(120%)';
  ctx.drawImage(img,0,0);

  const { data:{ text } } = await Tesseract.recognize(
    canvas,
    'chi_tra',
    { tessedit_pageseg_mode: Tesseract.PSM.AUTO }
  );

  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l);

  const names = [];
  const prices = [];

  lines.forEach(l=>{
    if(/\d{2,3}/.test(l)){
      prices.push(l.match(/\d{2,3}/)[0]);
    }else{
      names.push(l);
    }
  });

  const menu = names.slice(0, prices.length).map((n,i)=>({
    name:n,
    price:prices[i]
  }));

  if(menu.length){
    stores.value.push({
      name: "OCR店家",
      items: menu
    });
  }else{
    alert("辨識失敗");
  }

  ocrLoading.value = false;
};

// ===== 倒數 =====
setInterval(()=>{
  if(!activeTask.value) return;

  const now = new Date();
  const today = now.toISOString().split('T')[0];
  const deadline = new Date(today + 'T' + activeTask.value.cutoff);

  const diff = deadline - now;

  if(diff <= 0){
    countdown.value = "已截止";
    activeTask.value.closed = true;
    return;
  }

  const m = Math.floor(diff/60000);
  const s = Math.floor((diff%60000)/1000);

  countdown.value = `${m}分 ${s}秒`;

},1000);

// ===== 儲存 =====
setInterval(()=>{
  localStorage.setItem('stores',JSON.stringify(stores.value));
  localStorage.setItem('tasks',JSON.stringify(tasks.value));
},1000);

return {
  view,stores,newStore,
  addStore,removeItem,
  taskName,cutoffTime,createTask,
  activeTask,order,countdown,
  handleImage,ocrLoading
};

}
}).mount("#app");
</script>

</body>
</html>
